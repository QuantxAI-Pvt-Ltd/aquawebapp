<VirtualHost *:80>
    # If testing locally on WSL, change this to localhost!
    ServerName localhost 
    
    ProxyPreserveHost On

    # Backend API mapped to /api (No trailing slashes!)
    ProxyPass /api http://localhost:5001
    ProxyPassReverse /api http://localhost:5001

    # Dashboard mapped to /dashboard (No trailing slashes!)
    ProxyPass /dashboard http://localhost:5002
    ProxyPassReverse /dashboard http://localhost:5002

    # Main Frontend mapped to /aquainsure (No trailing slashes!)
    ProxyPass /aquainsure http://localhost:5000/aquainsure
    ProxyPassReverse /aquainsure http://localhost:5000/aquainsure

    # Optional: Automatically redirect the root domain to the app
    RedirectMatch ^/$ /aquainsure/

    ErrorLog ${APACHE_LOG_DIR}/aqua-error.log
    CustomLog ${APACHE_LOG_DIR}/aqua-access.log combined
</VirtualHost>

