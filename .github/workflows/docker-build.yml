name: Build Docker Images with Compose

# This workflow triggers on every push to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (improves caching and build capabilities)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the images using docker-compose
      - name: Build Docker Images
        run: |
          docker compose -f docker-compose.yml build
          
      # 4. (Optional) Start the containers to test if they run without crashing
      - name: Test Containers (Dry Run)
        run: |
          docker compose -f docker-compose.yml up -d
          
          # Wait a few seconds for services to start up
          sleep 10
          
          # Check the status of running containers
          docker ps
          
          # Check for any errors in the backend logs
          docker compose logs aquainsurebackend
          
      # 5. (Optional) Tear down the test environment
      - name: Stop Containers
        if: always()
        run: docker compose down
