name: Build Docker Images with Compose

# This workflow triggers on every push to the master branch
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      # 2. Set up Docker Buildx (improves caching and build capabilities)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Create .env files from GitHub Secrets
      - name: Create .env files
        run: |
          echo "PORT=${{ secrets.PORT }}" > ./AquaInsurebackend/.env
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> ./AquaInsurebackend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ./AquaInsurebackend/.env

      # 4. Build the images using docker-compose
      - name: Build Docker Images
        run: |
          docker compose -f docker-compose.yml build
          
      # 5. Login to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      # 6. Push the images to GHCR
      - name: Push Docker Images
        run: |
          docker compose -f docker-compose.yml push
