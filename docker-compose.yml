services:
  aquainsure:
    image: ghcr.io/quantxai-pvt-ltd/aquawebapp-aquainsure:latest
    build:
      context: ./AquaInsure
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - aquainsurebackend

  aquainsurebackend:
    image: ghcr.io/quantxai-pvt-ltd/aquawebapp-aquainsurebackend:latest
    build:
      context: ./AquaInsurebackend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    restart: unless-stopped
    env_file:
      - ./AquaInsurebackend/.env
    environment:
      # Use host.docker.internal to route to MongoDB installed directly on your Windows PC
      - MONGODB_URI=mongodb://host.docker.internal:27017/aquainsure
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    image: ghcr.io/quantxai-pvt-ltd/aquawebapp-aquainsuredashboard:latest
    build:
      context: ./Aquainsuredashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://aquainsurebackend:5001
    depends_on:
      - aquainsurebackend
    extra_hosts:
      - "host.docker.internal:host-gateway"
